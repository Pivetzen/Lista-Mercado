<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOPLIST.IO - Lista de Supermercado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        .item-selected { border: 3px solid #2563eb !important; background-color: #eff6ff; transform: scale(0.98); }
        .sticky-search { position: sticky; top: 60px; z-index: 15; }
        
        /* Estilização dos campos de quantidade */
        input[type=number].qtd-input::-webkit-inner-spin-button, 
        input[type=number].qtd-input::-webkit-outer-spin-button { 
            opacity: 1;
            height: 30px;
        }

        /* Área do Carrinho Fixo na Base */
        #container-carrinho-fixo {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            z-index: 40;
            border-top: 2px solid #e5e7eb;
            box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        #lista-ativa {
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-gray-50 pb-[500px]"> <header class="bg-white border-b sticky top-0 z-20 p-4 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-gray-800 tracking-tight">SHOPLIST.IO</h1>
            <div class="flex items-center gap-3">
                <button onclick="limparLista()" class="text-xs font-bold text-red-500 border border-red-200 px-3 py-1.5 rounded-lg hover:bg-red-50 transition">Limpar Tudo</button>
                <span id="contador" class="bg-blue-600 text-white text-xs font-bold px-2.5 py-1 rounded-full">0 itens</span>
            </div>
        </div>
    </header>

    <div class="bg-gray-50 p-4 sticky-search border-b">
        <div class="max-w-4xl mx-auto">
            <input type="text" id="inputBusca" oninput="filtrarProdutos()" 
                placeholder="🔍 Pesquisar no catálogo..." 
                class="w-full p-4 rounded-2xl border border-gray-200 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition text-lg">
        </div>
    </div>

    <main class="max-w-4xl mx-auto p-4">
        <section>
            <h2 class="text-sm font-bold text-gray-400 uppercase mb-4 tracking-widest">Catálogo</h2>
            <div id="catalogo" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3"></div>
        </section>
    </main>

    <div id="container-carrinho-fixo" class="hidden">
        <div class="max-w-4xl mx-auto">
            <div class="p-3 bg-gray-100 flex justify-between items-center border-b">
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Carrinho Atual</h2>
                <button onclick="document.getElementById('lista-ativa').classList.toggle('hidden')" class="text-[10px] font-bold text-blue-600 underline">Minimizar/Expandir</button>
            </div>
            
            <div id="lista-ativa" class="p-4 space-y-3"></div>

            <div class="p-4 bg-white border-t flex items-center justify-between">
                <div>
                    <p class="text-gray-400 text-[10px] uppercase font-bold">Total Estimado</p>
                    <p id="total-geral" class="text-2xl font-black text-blue-600">R$ 0,00</p>
                </div>
                <button onclick="gerarPDF()" class="bg-gray-900 text-white px-6 py-3 rounded-xl font-bold hover:bg-black transition shadow-lg flex items-center gap-2 text-sm">
                    Exportar PDF
                </button>
            </div>
        </div>
    </div>

    <script>
        const LINK_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXtoJflKYT3Iyln786UIJmC3bwtcebWos62fIXBKNH7HDMOOa0S1Pvky6dXzOSLJl4co9ZOUms1ns8/pub?gid=0&single=true&output=csv";

        let produtosBase = [];
        let carrinho = JSON.parse(localStorage.getItem('carrinho_shoplist')) || [];

        async function carregarPlanilha() {
            try {
                const res = await fetch(LINK_PLANILHA);
                const csv = await res.text();
                const linhas = csv.split(/\r?\n/).slice(1);
                produtosBase = linhas.filter(l => l.trim() !== "").map((linha, i) => {
                    const delimitador = linha.includes(';') ? ';' : ',';
                    const colunas = linha.split(delimitador);
                    return { id: i, foto: colunas[0]?.trim() || 'https://via.placeholder.com/150', nome: colunas[1]?.trim() || 'Sem nome' };
                });
                renderizarCatalogo(produtosBase);
                atualizarListaTrabalho();
            } catch (e) { console.error(e); }
        }

        function formatarMoedaInput(inputElement, index) {
            let valor = inputElement.value.replace(/\D/g, "");
            let numerico = (parseFloat(valor) / 100) || 0;
            carrinho[index].preco = numerico;
            inputElement.value = numerico.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            atualizarSubtotalVisual(index);
            localStorage.setItem('carrinho_shoplist', JSON.stringify(carrinho));
            calcTotal();
        }

        function atualizarSubtotalVisual(index) {
            const subtotalEl = document.getElementById(`subtotal-${index}`);
            if(subtotalEl) {
                const total = carrinho[index].qtd * carrinho[index].preco;
                subtotalEl.innerText = `R$ ${total.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            }
        }

        function renderizarCatalogo(lista) {
            const container = document.getElementById('catalogo');
            container.innerHTML = lista.map(p => {
                const estaNoCarrinho = carrinho.some(item => item.id === p.id);
                return `
                    <div onclick="toggleItem(${p.id})" id="card-${p.id}" 
                        class="bg-white border rounded-xl p-2 cursor-pointer transition-all duration-200 hover:shadow-md ${estaNoCarrinho ? 'item-selected' : ''}">
                        <img src="${p.foto}" class="w-full h-24 object-contain rounded-lg mb-2 pointer-events-none">
                        <p class="text-[10px] sm:text-xs font-bold text-center text-gray-700 truncate pointer-events-none uppercase">${p.nome}</p>
                    </div>`;
            }).join('');
        }

        function filtrarProdutos() {
            const termo = document.getElementById('inputBusca').value.toLowerCase();
            const filtrados = produtosBase.filter(p => p.nome.toLowerCase().includes(termo));
            renderizarCatalogo(filtrados);
        }

        function toggleItem(id) {
            const idx = carrinho.findIndex(item => item.id === id);
            if (idx > -1) { carrinho.splice(idx, 1); } 
            else {
                const p = produtosBase.find(item => item.id === id);
                carrinho.push({ ...p, qtd: 1, preco: 0 });
            }
            salvarEPresentar();
        }

        function salvarEPresentar() {
            localStorage.setItem('carrinho_shoplist', JSON.stringify(carrinho));
            document.getElementById('contador').innerText = `${carrinho.length} itens`;
            filtrarProdutos(); 
            atualizarListaTrabalho();
        }

        function atualizarListaTrabalho() {
            const container = document.getElementById('lista-ativa');
            const carrinhoFixo = document.getElementById('container-carrinho-fixo');
            
            if(carrinho.length === 0) { 
                carrinhoFixo.classList.add('hidden'); 
                calcTotal();
                return; 
            }
            carrinhoFixo.classList.remove('hidden');

            container.innerHTML = carrinho.map((item, i) => `
                <div class="bg-white border rounded-lg p-3 flex items-center gap-3 border-l-4 border-l-blue-500 shadow-sm text-sm">
                    <img src="${item.foto}" class="w-10 h-10 object-cover rounded bg-gray-50">
                    <div class="flex-1 min-w-0">
                        <p class="font-bold text-gray-800 truncate">${item.nome}</p>
                        <div class="flex gap-2 mt-1">
                            <input type="number" value="${item.qtd}" min="1" 
                                oninput="updateQtd(${i}, this.value)" 
                                class="qtd-input w-16 border rounded p-1 text-xs text-center font-bold outline-none">
                            <input type="text" 
                                value="${item.preco.toLocaleString('pt-BR', {minimumFractionDigits: 2})}" 
                                oninput="formatarMoedaInput(this, ${i})"
                                class="w-24 border rounded p-1 text-xs text-right font-bold text-green-700 outline-none">
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-gray-900 text-xs" id="subtotal-${i}">R$ ${(item.qtd * item.preco).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                        <button onclick="toggleItem(${item.id})" class="text-[9px] text-red-400 font-bold uppercase mt-1">Remover</button>
                    </div>
                </div>`).join('');
            calcTotal();
        }

        function updateQtd(i, val) {
            carrinho[i].qtd = parseFloat(val) || 0;
            atualizarSubtotalVisual(i);
            localStorage.setItem('carrinho_shoplist', JSON.stringify(carrinho));
            calcTotal();
        }

        function calcTotal() {
            const t = carrinho.reduce((acc, i) => acc + (i.qtd * i.preco), 0);
            document.getElementById('total-geral').innerText = `R$ ${t.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        }

        function limparLista() {
            if(confirm("Deseja apagar tudo?")) {
                carrinho = []; localStorage.removeItem('carrinho_shoplist');
                document.getElementById('contador').innerText = `0 itens`;
                renderizarCatalogo(produtosBase); atualizarListaTrabalho(); calcTotal();
            }
        }

        function gerarPDF() {
            if(carrinho.length === 0) return alert("Lista vazia!");
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.text("LISTA DE COMPRAS", 14, 20);
            
            const rows = carrinho.map(i => [
                "", i.nome.toUpperCase(), "", i.qtd, 
                `R$ ${i.preco.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`, 
                `R$ ${(i.qtd * i.preco).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`
            ]);

            doc.autoTable({
                head: [['OK', 'PRODUTO', 'OBS / MARCA', 'QTD', 'UNIT.', 'SUBTOTAL']],
                body: rows,
                startY: 32,
                theme: 'grid',
                headStyles: { fillColor: [37, 99, 235], fontStyle: 'bold', halign: 'center' },
                columnStyles: { 0: { cellWidth: 10, halign: 'center' }, 1: { cellWidth: 50 }, 2: { cellWidth: 45 }, 3: { cellWidth: 15, halign: 'center' }, 4: { halign: 'right' }, 5: { halign: 'right' } },
                didDrawCell: (data) => { if (data.section === 'body' && data.column.index === 0) { doc.setDrawColor(180); doc.rect(data.cell.x + 2.5, data.cell.y + 2, 5, 5); } },
                foot: [['', '', '', '', 'TOTAL:', `R$ ${carrinho.reduce((acc, i) => acc + (i.qtd * i.preco), 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`]],
                footStyles: { fillColor: [240, 240, 240], textColor: [0,0,0], fontStyle: 'bold', halign: 'right' }
            });
            doc.save(`lista-${new Date().toISOString().split('T')[0]}.pdf`);
        }

        carregarPlanilha();
    </script>
</body>
</html>
