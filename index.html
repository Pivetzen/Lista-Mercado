<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOPLIST.IO - Lista de Supermercado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        .item-selected { border: 3px solid #2563eb !important; background-color: #eff6ff; transform: scale(0.98); }
        .sticky-search { position: sticky; top: 60px; z-index: 15; }
        
        /* Garante que as setas de quantidade apareçam e sejam fáceis de clicar */
        input[type=number].qtd-input::-webkit-inner-spin-button, 
        input[type=number].qtd-input::-webkit-outer-spin-button { 
            opacity: 1;
            height: 24px;
            cursor: pointer;
        }

        #container-carrinho-fixo {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            z-index: 40;
            border-top: 2px solid #e5e7eb;
            box-shadow: 0 -8px 20px rgba(0, 0, 0, 0.1);
        }

        #lista-ativa {
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-gray-50 pb-[350px]">

    <header class="bg-white border-b sticky top-0 z-20 p-3 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-lg font-black text-gray-800 tracking-tight">SHOPLIST.IO</h1>
            <div class="flex items-center gap-3">
                <button onclick="limparLista()" class="text-[10px] font-bold text-red-500 border border-red-200 px-2 py-1 rounded hover:bg-red-50 transition">Limpar</button>
                <span id="contador" class="bg-blue-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">0 itens</span>
            </div>
        </div>
    </header>

    <div class="bg-gray-50 p-3 sticky-search border-b">
        <div class="max-w-4xl mx-auto">
            <input type="text" id="inputBusca" oninput="filtrarProdutos()" 
                placeholder="🔍 Pesquisar produtos..." 
                class="w-full p-3 rounded-xl border border-gray-200 shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition text-base">
        </div>
    </div>

    <main class="max-w-4xl mx-auto p-3">
        <div id="catalogo" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2"></div>
    </main>

    <div id="container-carrinho-fixo" class="hidden">
        <div class="max-w-4xl mx-auto">
            <div class="px-3 py-1 bg-gray-50 flex justify-between items-center border-b">
                <h2 class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Carrinho (Novos no topo)</h2>
            </div>
            
            <div id="lista-ativa" class="p-2 space-y-2"></div>

            <div class="p-3 bg-white border-t flex items-center justify-between">
                <div>
                    <p id="total-geral" class="text-xl font-black text-blue-600">R$ 0,00</p>
                    <p class="text-gray-400 text-[9px] uppercase font-bold">Total Estimado</p>
                </div>
                <button onclick="gerarPDF()" class="bg-gray-900 text-white px-5 py-2.5 rounded-lg font-bold hover:bg-black transition shadow-md text-xs">
                    Exportar PDF
                </button>
            </div>
        </div>
    </div>

    <script>
        const LINK_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXtoJflKYT3Iyln786UIJmC3bwtcebWos62fIXBKNH7HDMOOa0S1Pvky6dXzOSLJl4co9ZOUms1ns8/pub?gid=0&single=true&output=csv";

        let produtosBase = [];
        let carrinho = JSON.parse(localStorage.getItem('carrinho_shoplist')) || [];

        async function carregarPlanilha() {
            try {
                const res = await fetch(LINK_PLANILHA);
                const csv = await res.text();
                const linhas = csv.split(/\r?\n/).slice(1);
                produtosBase = linhas.filter(l => l.trim() !== "").map((linha, i) => {
                    const delimitador = linha.includes(';') ? ';' : ',';
                    const colunas = linha.split(delimitador);
                    return { id: i, foto: colunas[0]?.trim() || 'https://via.placeholder.com/150', nome: colunas[1]?.trim() || 'Sem nome' };
                });
                renderizarCatalogo(produtosBase);
                atualizarListaTrabalho();
            } catch (e) { console.error(e); }
        }

        // --- MÁSCARA FINANCEIRA PARA PREÇO ---
        function aplicarMascaraPreco(input, index) {
            let v = input.value.replace(/\D/g, "");
            let n = (parseFloat(v) / 100).toFixed(2);
            
            if (v.length === 0) n = "0.00";
            
            carrinho[index].preco = parseFloat(n);
            input.value = carrinho[index].preco.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            
            atualizarSubtotalVisual(index);
            salvarLocalStorage();
        }

        // --- LÓGICA PARA QUANTIDADE ---
        function updateQtd(index, val, input) {
            // Se o usuário apagar tudo, deixamos o campo vazio mas o valor interno como 0
            if (val === "") {
                carrinho[index].qtd = 0;
            } else {
                carrinho[index].qtd = parseFloat(val);
            }
            atualizarSubtotalVisual(index);
            salvarLocalStorage();
        }

        function atualizarSubtotalVisual(index) {
            const el = document.getElementById(`subtotal-${index}`);
            if (el) {
                const total = carrinho[index].qtd * carrinho[index].preco;
                el.innerText = `R$ ${total.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            }
            calcTotal();
        }

        function renderizarCatalogo(lista) {
            const container = document.getElementById('catalogo');
            container.innerHTML = lista.map(p => {
                const estaNoCarrinho = carrinho.some(item => item.id === p.id);
                return `
                    <div onclick="toggleItem(${p.id})" id="card-${p.id}" 
                        class="bg-white border rounded-lg p-2 cursor-pointer transition-all duration-200 hover:shadow-sm ${estaNoCarrinho ? 'item-selected' : ''}">
                        <img src="${p.foto}" class="w-full h-16 sm:h-20 object-contain rounded-md mb-1 pointer-events-none">
                        <p class="text-[9px] sm:text-[10px] font-bold text-center text-gray-700 truncate pointer-events-none uppercase">${p.nome}</p>
                    </div>`;
            }).join('');
        }

        function filtrarProdutos() {
            const termo = document.getElementById('inputBusca').value.toLowerCase();
            const filtrados = produtosBase.filter(p => p.nome.toLowerCase().includes(termo));
            renderizarCatalogo(filtrados);
        }

        function toggleItem(id) {
            const idx = carrinho.findIndex(item => item.id === id);
            if (idx > -1) { 
                carrinho.splice(idx, 1); 
            } else {
                const p = produtosBase.find(item => item.id === id);
                // Adiciona com preco 0 e qtd 0 (vazio) para forçar o preenchimento
                carrinho.unshift({ ...p, qtd: 0, preco: 0 });
            }
            salvarEPresentar();
        }

        function salvarEPresentar() {
            salvarLocalStorage();
            document.getElementById('contador').innerText = `${carrinho.length} itens`;
            filtrarProdutos(); 
            atualizarListaTrabalho();
        }

        function salvarLocalStorage() {
            localStorage.setItem('carrinho_shoplist', JSON.stringify(carrinho));
        }

        function atualizarListaTrabalho() {
            const container = document.getElementById('lista-ativa');
            const carrinhoFixo = document.getElementById('container-carrinho-fixo');
            
            if(carrinho.length === 0) { 
                carrinhoFixo.classList.add('hidden'); 
                calcTotal();
                return; 
            }
            carrinhoFixo.classList.remove('hidden');

            container.innerHTML = carrinho.map((item, i) => `
                <div class="bg-white border rounded p-2 flex items-center gap-2 border-l-2 border-l-blue-500 shadow-sm text-xs">
                    <img src="${item.foto}" class="w-8 h-8 object-cover rounded">
                    <div class="flex-1 min-w-0">
                        <p class="font-bold text-gray-800 truncate text-[11px]">${item.nome}</p>
                        <div class="flex gap-1 mt-1">
                            <input type="number" 
                                placeholder="Qtd"
                                value="${item.qtd === 0 ? '' : item.qtd}" 
                                onfocus="if(this.value=='0')this.value=''"
                                oninput="updateQtd(${i}, this.value, this)" 
                                class="qtd-input w-14 border rounded p-0.5 text-center font-bold border-gray-300 outline-none focus:border-blue-500">
                            
                            <input type="text" 
                                value="${item.preco === 0 ? '0,00' : item.preco.toLocaleString('pt-BR', {minimumFractionDigits: 2})}" 
                                oninput="aplicarMascaraPreco(this, ${i})"
                                onfocus="this.select()"
                                class="w-20 border rounded p-0.5 text-right font-bold text-green-700 border-gray-300 outline-none focus:border-green-500">
                        </div>
                    </div>
                    <div class="text-right min-w-[75px]">
                        <p class="font-black text-gray-900 text-[10px]" id="subtotal-${i}">R$ ${(item.qtd * item.preco).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                        <button onclick="toggleItem(${item.id})" class="text-[8px] text-red-500 font-bold uppercase mt-1">Remover</button>
                    </div>
                </div>`).join('');
            calcTotal();
        }

        function calcTotal() {
            const t = carrinho.reduce((acc, i) => acc + (i.qtd * i.preco), 0);
            document.getElementById('total-geral').innerText = `R$ ${t.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        }

        function limparLista() {
            if(confirm("Deseja apagar tudo?")) {
                carrinho = []; salvarLocalStorage();
                document.getElementById('contador').innerText = `0 itens`;
                renderizarCatalogo(produtosBase); atualizarListaTrabalho(); calcTotal();
            }
        }

        function gerarPDF() {
            if(carrinho.length === 0) return alert("Lista vazia!");
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.text("LISTA DE COMPRAS", 14, 20);
            
            const rows = carrinho.map(i => [
                "", i.nome.toUpperCase(), "", i.qtd, 
                `R$ ${i.preco.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`, 
                `R$ ${(i.qtd * i.preco).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`
            ]);

            doc.autoTable({
                head: [['OK', 'PRODUTO', 'OBS / MARCA', 'QTD', 'UNIT.', 'SUBTOTAL']],
                body: rows,
                startY: 32,
                theme: 'grid',
                headStyles: { fillColor: [37, 99, 235], fontStyle: 'bold', halign: 'center' },
                columnStyles: { 0: { cellWidth: 10, halign: 'center' }, 1: { cellWidth: 50 }, 2: { cellWidth: 45 }, 3: { cellWidth: 15, halign: 'center' }, 4: { halign: 'right' }, 5: { halign: 'right' } },
                didDrawCell: (data) => { if (data.section === 'body' && data.column.index === 0) { doc.setDrawColor(180); doc.rect(data.cell.x + 2.5, data.cell.y + 2, 5, 5); } },
                foot: [['', '', '', '', 'TOTAL:', `R$ ${carrinho.reduce((acc, i) => acc + (i.qtd * i.preco), 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`]],
                footStyles: { fillColor: [240, 240, 240], textColor: [0,0,0], fontStyle: 'bold', halign: 'right' }
            });
            doc.save(`lista-${new Date().toISOString().split('T')[0]}.pdf`);
        }

        carregarPlanilha();
    </script>
</body>
</html>
